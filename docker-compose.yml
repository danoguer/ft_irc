services:
  irc-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ft_irc_container
    ports:
      - "${IRC_PORT}:${IRC_PORT}"
    environment:
      - IRC_PORT=${IRC_PORT}
      - IRC_PASSWORD=${IRC_PASSWORD}
    command: ["./ircserv", "${IRC_PORT}", "${IRC_PASSWORD}"]
    restart: unless-stopped

    # 🩺 Monitorización activa del socket TCP del servidor
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost ${IRC_PORT}"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # 🛰️ Cliente automatizado para la prueba de humo (Smoke Test)
  irc-client:
    image: debian:bookworm-slim
    container_name: ft_irc_client
    # -w 2 le dice a nc: "Cierra la conexión si pasan 2 segundos sin actividad"
    # Esto evita que el contenedor se quede congelado infinitamente en el log.
    command: >
      sh -c "apt-get update && apt-get install -y netcat-openbsd && sleep 3 && 
      printf 'NICK botdevops\nUSER bot 0 * :bot\nCAP LS\n' | nc -w 2 irc-server ${IRC_PORT}"
    depends_on:
      irc-server:
        condition: service_started
