services:
  irc-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ft_irc_container
    ports:
      - "${IRC_PORT}:${IRC_PORT}"
    environment:
      - IRC_PORT=${IRC_PORT}
      - IRC_PASSWORD=${IRC_PASSWORD}
    command: ["./ircserv", "${IRC_PORT}", "${IRC_PASSWORD}"]
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 5000
        hard: 5000
    networks:
      irc_network:
        ipv4_address: 172.20.0.2
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "${IRC_PORT}"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s

  irc-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ft_irc_bot
    environment:
      - IRC_PORT=${IRC_PORT}
      - IRC_PASSWORD=${IRC_PASSWORD}
    command: ["./ircbot", "172.20.0.2", "${IRC_PORT}", "${IRC_PASSWORD}", "SRE_WeatherBot"]
    restart: unless-stopped
    networks:
      - irc_network
    depends_on:
      irc-server:
        condition: service_healthy

  irc-client:
    image: debian:bookworm-slim
    container_name: ft_irc_client
    command: >
      sh -c "apt-get update && apt-get install -y netcat-openbsd && sleep 3 && 
      printf 'NICK botdevops\nUSER bot 0 * :bot\nCAP LS\n' | nc -w 2 172.20.0.2 ${IRC_PORT}"
    networks:
      - irc_network
    depends_on:
      irc-server:
        condition: service_started

networks:
  irc_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
